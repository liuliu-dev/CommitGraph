name: Run CI on commit-graph
on:
  pull_request:
    paths:
      - "**"
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install and CI
        run: yarn && yarn ci
